<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero Cross 3D | Gaming World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    :root{
      --bg-1:#060816;
      --bg-2:#0d1024;
      --card:rgba(17, 24, 39, 0.58);
      --glass:rgba(255,255,255,0.06);
      --line:rgba(255,255,255,0.10);
      --text:#f8fafc;
      --muted:#94a3b8;
      --cyan:#22d3ee;
      --cyan-glow:rgba(34,211,238,.45);
      --pink:#ec4899;
      --pink-glow:rgba(236,72,153,.45);
      --purple:#a855f7;
      --purple-glow:rgba(168,85,247,.45);
      --green:#34d399;
      --shadow:0 25px 60px rgba(0,0,0,.55);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    html{ scroll-behavior:smooth; }

    body{
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(168,85,247,.14), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(34,211,238,.12), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(236,72,153,.10), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      overflow-x:hidden;
      padding-bottom:40px;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.03) 50%, transparent 100%);
      pointer-events:none;
      transform:translateX(-40%);
      animation:shine 10s linear infinite;
      opacity:.55;
    }

    @keyframes shine{
      0%{ transform:translateX(-45%); }
      100%{ transform:translateX(45%); }
    }

    header{
      width:100%;
      padding:18px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      backdrop-filter:blur(14px);
      background:rgba(255,255,255,.03);
      border-bottom:1px solid rgba(255,255,255,.06);
      position:sticky;
      top:0;
      z-index:20;
    }

    .back-btn{
      color:var(--text);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      transition:.25s ease;
      font-weight:500;
      box-shadow:0 0 0 rgba(0,0,0,0);
    }

    .back-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(34,211,238,.35);
      box-shadow:0 0 18px rgba(34,211,238,.18);
      color:var(--cyan);
    }

    .logo{
      font-size:24px;
      font-weight:800;
      color:var(--cyan);
      text-shadow:0 0 14px var(--cyan-glow);
      letter-spacing:.4px;
    }

    .wrap{
      width:100%;
      display:flex;
      justify-content:center;
      padding:34px 16px 0;
    }

    .game-container{
      width:min(920px, 96vw);
      position:relative;
      border-radius:30px;
      padding:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      transform-style:preserve-3d;
      perspective:1200px;
      overflow:hidden;
    }

    .game-container::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:30px;
      background:linear-gradient(135deg, rgba(34,211,238,.18), rgba(168,85,247,.16), rgba(236,72,153,.16));
      filter:blur(22px);
      z-index:0;
      opacity:.75;
      pointer-events:none;
    }

    .top-area{
      position:relative;
      z-index:1;
      text-align:center;
    }

    h1{
      font-size:clamp(2rem, 5vw, 3.4rem);
      font-weight:800;
      margin-bottom:4px;
      background:linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      letter-spacing:.5px;
      text-shadow:0 0 18px rgba(0,0,0,.2);
    }

    .subtitle{
      color:var(--muted);
      margin-bottom:24px;
      font-size:14px;
    }

    .settings{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .select-btn,
    .action-btn{
      border:none;
      cursor:pointer;
      transition:.25s ease;
      font-weight:700;
      letter-spacing:.2px;
    }

    .select-btn{
      padding:11px 18px;
      border-radius:14px;
      color:var(--text);
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .select-btn:hover:not(.active){
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.18);
      background:rgba(255,255,255,.07);
    }

    .select-btn.active{
      color:#09111f;
      background:linear-gradient(135deg, var(--cyan), #7dd3fc);
      box-shadow:0 0 20px var(--cyan-glow);
    }

    .select-btn:disabled{
      opacity:.75;
      cursor:default;
    }

    .scoreboard{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin:0 auto 22px;
      max-width:620px;
    }

    .score-item{
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.07);
      border-radius:20px;
      padding:15px 12px;
      text-align:center;
      transform:translateZ(18px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }

    .score-label{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1.3px;
      margin-bottom:2px;
    }

    .score-value{
      font-size:28px;
      font-weight:800;
      line-height:1;
    }

    .x-score .score-value{ color:var(--cyan); text-shadow:0 0 14px var(--cyan-glow); }
    .o-score .score-value{ color:var(--pink); text-shadow:0 0 14px var(--pink-glow); }

    .status-msg{
      font-size:18px;
      font-weight:700;
      margin-bottom:22px;
      min-height:30px;
      color:#e5e7eb;
    }

    .status-msg span{
      color:var(--cyan);
      text-shadow:0 0 10px var(--cyan-glow);
    }

    .status-msg span.o-turn{
      color:var(--pink);
      text-shadow:0 0 10px var(--pink-glow);
    }

    .board-tilt{
      width:min(410px, 92vw);
      margin:0 auto 24px;
      perspective:1100px;
      transform-style:preserve-3d;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      transform:rotateX(14deg) rotateY(-12deg) rotateZ(-1deg);
      transform-style:preserve-3d;
      transition:transform .35s ease;
      will-change:transform;
      padding:8px;
    }

    .board:hover{
      transform:rotateX(10deg) rotateY(-6deg) rotateZ(0deg) translateY(-2px);
    }

    .cell{
      aspect-ratio:1;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(2.2rem, 7vw, 3.6rem);
      font-weight:800;
      cursor:pointer;
      user-select:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.03)),
        rgba(15,23,42,.65);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        0 10px 24px rgba(0,0,0,.25),
        inset 0 1px 0 rgba(255,255,255,.05);
      transform-style:preserve-3d;
      transform:translateZ(0);
      transition:
        transform .18s ease,
        box-shadow .18s ease,
        border-color .18s ease,
        background .18s ease;
      will-change:transform;
      position:relative;
      overflow:hidden;
    }

    .cell::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.12), transparent 55%);
      opacity:0;
      transition:.2s ease;
    }

    .cell:hover{
      transform:translateY(-4px) translateZ(14px);
      border-color:rgba(255,255,255,.18);
      box-shadow:
        0 16px 30px rgba(0,0,0,.34),
        0 0 18px rgba(255,255,255,.05),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    .cell:hover::after{
      opacity:1;
    }

    .cell.x{
      color:var(--cyan);
      text-shadow:0 0 18px var(--cyan-glow);
    }

    .cell.o{
      color:var(--pink);
      text-shadow:0 0 18px var(--pink-glow);
    }

    .cell.win-x{
      background:rgba(34,211,238,.14);
      box-shadow:0 0 26px rgba(34,211,238,.20);
    }

    .cell.win-o{
      background:rgba(236,72,153,.14);
      box-shadow:0 0 26px rgba(236,72,153,.20);
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:6px;
      position:relative;
      z-index:1;
    }

    .action-btn{
      padding:13px 28px;
      font-size:15px;
      border-radius:999px;
      color:#09111f;
      background:linear-gradient(135deg, var(--cyan), var(--purple));
      box-shadow:0 10px 25px rgba(34,211,238,.18);
    }

    .action-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(168,85,247,.22);
    }

    .helper{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }

    .pulse{
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 14px rgba(52,211,153,.75);
      margin-right:8px;
      vertical-align:middle;
      animation:pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{ transform:scale(1); opacity:.8; }
      50%{ transform:scale(1.45); opacity:1; }
    }

    #canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      border-radius:30px;
      z-index:0;
    }

    @media (max-width:720px){
      header{
        padding:16px 5%;
      }

      .logo{
        font-size:18px;
      }

      .game-container{
        padding:20px 16px 22px;
      }

      .scoreboard{
        grid-template-columns:1fr;
        max-width:320px;
      }

      .board{
        gap:10px;
        transform:rotateX(9deg) rotateY(-8deg);
      }

      .cell{
        border-radius:16px;
      }

      .status-msg{
        font-size:16px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation:none !important;
        transition:none !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Main Hub</a>
    <div class="logo">Gaming Hub 🎮</div>
  </header>

  <div class="wrap">
    <div class="game-container">
      <canvas id="canvas"></canvas>

      <div class="top-area">
        <h1>Zero Cross ❌⭕</h1>
        <div class="subtitle">3D Tic-Tac-Toe with smoother motion and neon glow</div>

        <div class="settings">
          <button class="select-btn active" id="btn-pvp" onclick="setMode('pvp')">Local vs Friend</button>
          <button class="select-btn" id="btn-ai" onclick="setMode('ai')">vs Cyber AI</button>
          <button class="select-btn" id="btn-difficulty" style="display:none;" onclick="toggleDifficulty()">Difficulty: Hard</button>
        </div>

        <div class="scoreboard">
          <div class="score-item x-score">
            <div class="score-label">Player X</div>
            <div class="score-value" id="score-x">0</div>
          </div>
          <div class="score-item">
            <div class="score-label">Ties</div>
            <div class="score-value" id="score-ties">0</div>
          </div>
          <div class="score-item o-score">
            <div class="score-label" id="label-o">Player O</div>
            <div class="score-value" id="score-o">0</div>
          </div>
        </div>

        <div class="status-msg" id="status">Player <span>X</span>'s Turn</div>

        <div class="board-tilt">
          <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
          </div>
        </div>

        <div class="actions">
          <button class="action-btn" onclick="resetGame(true)">Restart Game</button>
        </div>

        <div class="helper"><span class="pulse"></span> Smooth 3D board, glow effects, AI mode, and confetti win animation</div>
      </div>
    </div>
  </div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      const now = audioCtx.currentTime;

      if (type === 'x') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(320, now);
        osc.frequency.exponentialRampToValueAtTime(640, now + 0.08);
        gain.gain.setValueAtTime(0.16, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.09);
        osc.start(now);
        osc.stop(now + 0.09);
      } else if (type === 'o') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(460, now);
        osc.frequency.exponentialRampToValueAtTime(240, now + 0.09);
        gain.gain.setValueAtTime(0.16, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.09);
        osc.start(now);
        osc.stop(now + 0.09);
      } else if (type === 'win') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(523.25, now);
        osc.frequency.setValueAtTime(659.25, now + 0.08);
        osc.frequency.setValueAtTime(783.99, now + 0.16);
        osc.frequency.setValueAtTime(1046.50, now + 0.24);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.linearRampToValueAtTime(0.12, now + 0.26);
        gain.gain.linearRampToValueAtTime(0, now + 0.42);
        osc.start(now);
        osc.stop(now + 0.42);
      } else if (type === 'tie') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.linearRampToValueAtTime(110, now + 0.22);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.22);
        osc.start(now);
        osc.stop(now + 0.22);
      }
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let confetti = [];
    let animationFrameId;

    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class ConfettiParticle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -10 - Math.random() * 25;
        this.size = Math.random() * 6 + 4;
        this.speedX = Math.random() * 4 - 2;
        this.speedY = Math.random() * 3 + 2;
        this.rotation = Math.random() * 360;
        this.rotationSpeed = Math.random() * 4 - 2;
        this.color = `hsl(${Math.random() * 360}, 85%, 62%)`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.rotation * Math.PI) / 180);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        ctx.restore();
      }
    }

    function spawnConfetti() {
      confetti = [];
      for (let i = 0; i < 100; i++) confetti.push(new ConfettiParticle());
      cancelAnimationFrame(animationFrameId);
      animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      confetti.forEach(p => {
        p.update();
        p.draw();
        if (p.y < canvas.height + 20) alive = true;
      });
      if (alive) animationFrameId = requestAnimationFrame(animateConfetti);
    }

    let boardState = Array(9).fill(null);
    let currentPlayer = 'X';
    let isGameActive = true;
    let gameMode = 'pvp';
    let isAiEasy = false;
    let scoreX = 0;
    let scoreO = 0;
    let scoreTies = 0;
    let aiLocked = false;

    const cells = document.querySelectorAll('.cell');
    const statusText = document.getElementById('status');
    const labelO = document.getElementById('label-o');

    const winConditions = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function setMode(mode) {
      gameMode = mode;
      document.getElementById('btn-pvp').classList.toggle('active', mode === 'pvp');
      document.getElementById('btn-ai').classList.toggle('active', mode === 'ai');

      const diffBtn = document.getElementById('btn-difficulty');
      if (mode === 'ai') {
        diffBtn.style.display = 'inline-block';
        labelO.innerText = 'Cyber AI';
      } else {
        diffBtn.style.display = 'none';
        labelO.innerText = 'Player O';
      }
      resetGame(false);
    }

    function toggleDifficulty() {
      isAiEasy = !isAiEasy;
      const diffBtn = document.getElementById('btn-difficulty');
      diffBtn.innerText = isAiEasy ? 'Difficulty: Easy' : 'Difficulty: Hard';
      resetGame(false);
    }

    function cellClicked(e) {
      const index = Number(e.currentTarget.getAttribute('data-index'));
      if (!isGameActive || aiLocked || boardState[index] !== null) return;

      makeMove(index, currentPlayer);

      if (isGameActive && gameMode === 'ai' && currentPlayer === 'O') {
        aiLocked = true;
        isGameActive = false;
        setTimeout(() => {
          aiMove();
          aiLocked = false;
        }, 260);
      }
    }

    function makeMove(index, player) {
      boardState[index] = player;
      const cell = cells[index];
      cell.classList.add(player.toLowerCase());
      cell.innerText = player;
      playSound(player.toLowerCase());
      checkResult();
    }

    function highlightWin(combo, player) {
      combo.forEach(idx => {
        cells[idx].classList.add(player === 'X' ? 'win-x' : 'win-o');
      });
    }

    function checkResult() {
      for (const combo of winConditions) {
        const [a, b, c] = combo;
        if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
          const winner = boardState[a];
          highlightWin(combo, winner);

          statusText.innerHTML = `<span class="${winner.toLowerCase()}-turn">${winner} Wins! 🎉</span>`;
          isGameActive = false;

          if (winner === 'X') {
            scoreX++;
            document.getElementById('score-x').innerText = scoreX;
          } else {
            scoreO++;
            document.getElementById('score-o').innerText = scoreO;
          }

          playSound('win');
          spawnConfetti();
          return;
        }
      }

      if (!boardState.includes(null)) {
        statusText.innerHTML = `<span>It's a Tie! 🤝</span>`;
        isGameActive = false;
        scoreTies++;
        document.getElementById('score-ties').innerText = scoreTies;
        playSound('tie');
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusText.innerHTML = `Player <span class="${currentPlayer.toLowerCase()}-turn">${currentPlayer}</span>'s Turn`;
      isGameActive = true;
    }

    function aiMove() {
      if (!boardState.includes(null) || !isGameActive) return;

      let bestMove;
      if (isAiEasy) {
        const emptyCells = boardState
          .map((val, idx) => (val === null ? idx : null))
          .filter(val => val !== null);
        bestMove = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      } else {
        bestMove = getBestMove(boardState.slice(), 'O').index;
      }

      if (bestMove !== undefined) {
        makeMove(bestMove, 'O');
      }
    }

    function getBestMove(newBoard, player) {
      const availSpots = newBoard.map((val, idx) => val === null ? idx : null).filter(val => val !== null);

      if (checkWinForPlayer(newBoard, 'X')) return { score: -10 };
      if (checkWinForPlayer(newBoard, 'O')) return { score: 10 };
      if (availSpots.length === 0) return { score: 0 };

      const moves = [];

      for (const spot of availSpots) {
        const move = { index: spot };
        newBoard[spot] = player;

        const result = player === 'O'
          ? getBestMove(newBoard, 'X')
          : getBestMove(newBoard, 'O');

        move.score = result.score;
        newBoard[spot] = null;
        moves.push(move);
      }

      let bestMoveIndex = 0;

      if (player === 'O') {
        let bestScore = -Infinity;
        for (let i = 0; i < moves.length; i++) {
          if (moves[i].score > bestScore) {
            bestScore = moves[i].score;
            bestMoveIndex = i;
          }
        }
      } else {
        let bestScore = Infinity;
        for (let i = 0; i < moves.length; i++) {
          if (moves[i].score < bestScore) {
            bestScore = moves[i].score;
            bestMoveIndex = i;
          }
        }
      }

      return moves[bestMoveIndex];
    }

    function checkWinForPlayer(board, player) {
      return winConditions.some(combo => combo.every(idx => board[idx] === player));
    }

    function resetGame(fullReset) {
      boardState = Array(9).fill(null);
      currentPlayer = 'X';
      isGameActive = true;
      aiLocked = false;
      statusText.innerHTML = `Player <span class="x-turn">X</span>'s Turn`;

      cells.forEach(cell => {
        cell.classList.remove('x', 'o', 'win-x', 'win-o');
        cell.innerText = '';
      });

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      cancelAnimationFrame(animationFrameId);

      if (fullReset) {
        scoreX = 0;
        scoreO = 0;
        scoreTies = 0;
        document.getElementById('score-x').innerText = 0;
        document.getElementById('score-o').innerText = 0;
        document.getElementById('score-ties').innerText = 0;
      }
    }

    cells.forEach(cell => cell.addEventListener('click', cellClicked));
  </script>
</body>
</html>
